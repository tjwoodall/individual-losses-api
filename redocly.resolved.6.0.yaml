                  value: *ref_29
                FORMAT_TYPE_OF_CLAIM:
                  description: |
                    The format of the type of claim is not valid.
                  value: *ref_26
                FORMAT_VALUE:
                  description: |
                    One or more values have been added with the incorrect format.
                  value: *ref_11
                RULE_INVALID_SEQUENCE_START:
                  description: |
                    The sequence does not begin with 1.
