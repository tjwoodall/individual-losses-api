  /individuals/losses/{nino}/loss-claims/tax-year/{taxYearClaimedFor}:
    get:
      summary: List Loss Claims
      description: |
        This endpoint enables you to retrieve the existing loss claims information.
        A National Insurance Number and tax year must be provided.

        <strong>
          Note: carry-sideways-fhl type of loss claims for income sources uk-property-fhl and foreign-property-fhl-eea will not be supported from tax year 2025-26 onwards.
        </strong>

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                                                                                       |
        | -------------------------------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |
        | N/A - DEFAULT                    | Simulates successful self-employment response where typeOfClaim is "carry-forward".                                                                                                            |
        | UK_PROPERTY                      | Simulates successful uk-property response where typeOfClaim is "carry-sideways-fhl".                                                                                                   |
        | FOREIGN_PROPERTY                 | Simulates successful foreign property response where typeOfClaim is "carry-sideways".                                                                                                          |
        | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                                                                                                 |
        | DYNAMIC                          | The following response values will change to correspond to the values submitted in the request:<br> • taxYearClaimedFor<br> • lastModified<br> • typeOfLoss<br> • typeOfClaim<br> • businessId |
        | STATEFUL                         | Performs a stateful list.                                                                                                                                                                      |
      tags:
        - Loss Claims
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: *ref_3
          required: true
        - name: taxYearClaimedFor
          in: path
          description: |
            The tax year to which the claim applies. The start year and end year must not span two tax years. The minimum tax year is 2019-20. No gaps are allowed, for example, 2022-24 is not valid.
          schema: &ref_28
            type: string
            example: 2019-20
            pattern: ^2[0-9]{3}-[0-9]{2}$
          required: true
        - in: query
          name: businessId
          description: |
            An identifier for the business, unique to the customer.
          schema: *ref_24
          required: false
        - in: query
          name: typeOfLoss
          description: |
            The type of business the loss applies to.
          schema:
            type: string
            enum:
              - self-employment
              - uk-property
              - foreign-property
            example: self-employment
          required: false
        - in: query
          name: typeOfClaim
          description: |
            The type of claim to be applied. If no parameter value is supplied, all claim types (carry-forward and carry-sideways) will be returned.
          schema:
            type: string
            enum:
              - carry-sideways
            example: carry-sideways
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_22
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_8
          required: false
      security:
        - User-Restricted:
            - read:self-assessment
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: For all given tax year
                description: List of Loss Claims
                type: object
                properties:
                  claims:
                    type: array
                    items:
                      type: object
                      description: An array of loss claim objects. An empty array is not returned, if no loss claims exist for the supplied NINO, a MATCHING_RESOURCE_NOT_FOUND error is returned.
                      properties:
                        businessId:
                          description: An identifier for the business, unique to the customer.
                          type: string
                          pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                          example: XAIS12345678910
                        typeOfLoss:
                          type: string
                          enum:
                            - self-employment
                            - uk-property
                            - foreign-property
                          description: The type of business the loss applies to.
                        typeOfClaim:
                          type: string
                          enum:
                            - carry-forward
                            - carry-sideways
                            - carry-sideways-fhl
                            - carry-forward-to-carry-sideways
                          description: 'The type of claim to be applied. Permitted values for "self-employment": carry-forward, carry-sideways. Permitted values for "uk-property" and "foreign-property": carry-sideways, carry-sideways-fhl, carry-forward-to-carry-sideways.'
                        taxYearClaimedFor:
                          type: string
                          description: The tax year to which the claim applies. The start year and end year must not span two tax years. The minimum tax year is 2019-20. No gaps are allowed, for example, 2022-24 is not valid.
                          example: 2022-23
                        claimId:
                          type: string
                          description: 'Unique identifier for the loss claim. '
                          example: AAZZ0123456789a
                        sequence:
                          type: number
                          description: The order number in which this loss claim is to be used it must be an integer in the range 1 to 99. The sequence must start with 1 and have no gaps.
                        lastModified:
                          type: string
                          description: The timestamp when the entry was created or last modified.
                          example: '2020-07-13T12:13:48.763Z'
                      required:
                        - businessId
                        - typeOfLoss
                        - typeOfClaim
                        - taxYearClaimedFor
                        - claimId
                        - lastModified
                      additionalProperties: false
                required:
                  - claims
                additionalProperties: false
              examples:
                example-1:
                  description: Self-Employment Loss Claim
                  value:
                    claims:
                      - businessId: XBIS12356589871
                        typeOfLoss: self-employment
                        typeOfClaim: carry-sideways
                        taxYearClaimedFor: 2019-20
                        claimId: AAZZ0123456789a
                        sequence: 1
                        lastModified: '2020-07-13T12:13:48.763Z'
                example-2:
                  description: UK Property Loss Claim
