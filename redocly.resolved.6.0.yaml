          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_8
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: For all given tax year
              description: Amend Loss Claims Order
              type: object
              properties:
                typeOfClaim:
                  type: string
                  description: The type of loss claims whose order is to be amended.
                  enum:
                    - carry-sideways
                listOfLossClaims:
                  type: array
                  description: A list of the claims to be amended - all of the claims for a given type and tax year must be included in the submission.
                  items:
                    type: object
                    properties:
                      claimId:
                        description: The unique identifier for the loss claim.
                        pattern: ^[A-Za-z0-9]{15}
                        type: string
                        example: 1234568790ABCDE
                      sequence:
                        description: The order number in which this loss claim is to be used. It must be an integer in the range 1 to 99. The sequence must start with 1 and have no gaps.
                        type: integer
                        example: '1'
                    required:
                      - claimId
                      - sequence
                    additionalProperties: false
              required:
                - typeOfClaim
                - listOfLossClaims
              additionalProperties: false
            examples:
              example-1:
                description: Given any tax year
                value:
                  typeOfClaim: carry-sideways
                  listOfLossClaims:
                    - claimId: 1234567890ABCDE
                      sequence: 2
                    - claimId: 1234567890ABDE0
                      sequence: 3
                    - claimId: 1234567890ABEF1
                      sequence: 1
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
