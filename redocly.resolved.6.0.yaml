                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: |
                    Matching resource not found.
                  value: *ref_18
  /individuals/losses/{nino}/loss-claims/order/{taxYearClaimedFor}:
    put:
      summary: Amend Loss Claims Order
      tags:
        - Loss Claims
      security:
        - User-Restricted:
            - write:self-assessment
      description: |
        This endpoint allows the developer to change the sequence in which carry sideways losses are used. 
        A National Insurance Number and tax year must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                              |
        | -------------------------------- | ------------------------------------------------------------------------------------- |
        | N/A - DEFAULT                    | Simulates success response.                                                           |
        | LOSS_CLAIMS_MISSING              | Simulates the scenario where not all claims of the given type and year were included. |
        | NOT_FOUND                        | Simulates the scenario where one or more claims were not found.                       |
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window. |
        | STATEFUL                         | Performs a stateful update.                                                           |
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: *ref_3
          required: true
        - name: taxYearClaimedFor
          in: path
          description: |
            The tax year to which the claim applies. The start year and end year must not span two tax years. The minimum tax year is 2019-20. No gaps are allowed, for example, 2022-24 is not valid.
          schema: *ref_28
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_6
          required: true
        - name: Authorization
