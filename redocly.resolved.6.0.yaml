  /individuals/losses/{nino}/loss-claims/{claimId}/tax-year/{taxYearClaimedFor}/change-type-of-claim:
    post:
      summary: Amend a Loss Claim Type
      description: |
        This endpoint enables you to change the type of claim for an existing loss claim type.
        A National Insurance Number, tax year and Claim ID must be provided.

        <strong>
          Note: carry-sideways-fhl type of loss claims for income sources uk-property-fhl and foreign-property-fhl-eea will not be supported from tax year 2025-26 onwards.
        </strong>

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                                               |
        | -------------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------ |
        | N/A - DEFAULT                    | Simulates success response.                                                                                                                            |
        | FP_FORWARD                       | Simulates a Foreign Property carried forward scenario.                                                                                                 |
        | FP_SIDEWAYS                      | Simulates a Foreign Property carried sideways scenario.                                                                                                |
        | UK_FORWARD                       | Simulates a UK Property (Non-FHL) carried forward scenario.                                                                                            |
        | UK_FORWARD_TO_SIDEWAYS           | Simulates a UK Property (Non-FHL) carried forward to sideways scenario.                                                                                |
        | UK_SIDEWAYS                      | Simulates a UK Property (Non-FHL) carried sideways scenario.                                                                                           |
        | UK_SIDEWAYS_FHL                  | Simulates a UK Property FHL carried sideways scenario.                                                                                                 |
        | SE_FORWARD                       | Simulates a Self Employment carried forward scenario.                                                                                                  |
        | SE_SIDEWAYS                      | Simulates a Self Employment carried sideways scenario.                                                                                                 |
        | NO_CHANGE                        | Simulates the scenario where the relief type has not changed.                                                                                          |
        | TYPE_OF_CLAIM_INVALID            | Simulates the scenario where a claim type is invalid for the income source.                                                                            |         
        | CSFHL_CLAIM_NOT_SUPPORTED        | Simulates the scenario where carry-sideways-fhl claim submitted for income sources "FHL Property - EEA" and "UK Property FHL".                         |
        | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                                                         |
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.                                                        |
        | STATEFUL                         | Performs a stateful update.                                                                                                                            |
        | DYNAMIC                          | The following response values will change to correspond to the values submitted in the request:<br> • typeOfClaim<br> •  typeOfLoss<br> • lastModified |
      tags:
        - Loss Claims
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: *ref_3
          required: true
        - name: claimId
          in: path
          description: |
            Unique identifier for the loss claim.
          schema: *ref_27
          required: true
        - name: taxYearClaimedFor
          in: path
          description: |
            The tax year to which the claim applies. The start year and end year must not span two tax years. The minimum tax year is 2019-20. No gaps are allowed, for example, 2022-24 is not valid.
          schema: *ref_28
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_6
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_7
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_8
          required: false
      security:
        - User-Restricted:
            - write:self-assessment
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: For all given tax year
              description: Amend a Loss Claim Type Request
              type: object
              properties:
                typeOfClaim:
                  type: string
                  description: 'The type of claim to be applied. Permitted values for "self-employment": carry-forward, carry-sideways. Permitted values for "uk-property" and "foreign-property": carry-sideways, carry-sideways-fhl, carry-forward-to-carry-sideways.'
                  example: carry-forward
              required:
                - typeOfClaim
              additionalProperties: false
            examples:
              example-1:
                description: Given any tax year
                value:
                  typeOfClaim: carry-forward
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: For all given tax year
                description: Retrieve a Loss Claim Response
                type: object
                properties:
                  taxYearClaimedFor:
                    type: string
                    description: The tax year to which the claim applies. The start year and end year must not span two tax years. The minimum tax year is 2019-20. No gaps are allowed, for example, 2022-24 is not valid.
                    example: 2022-23
                  typeOfLoss:
                    type: string
                    enum:
                      - self-employment
                      - uk-property
                      - foreign-property
                    description: The type of business the loss applies to.
                  typeOfClaim:
                    type: string
                    enum:
                      - carry-forward
                      - carry-sideways
                      - carry-sideways-fhl
                      - carry-forward-to-carry-sideways
                    description: 'The type of claim to be applied. Permitted values for "self-employment": carry-forward, carry-sideways. Permitted values for "uk-property" and "foreign-property": carry-sideways, carry-sideways-fhl, carry-forward-to-carry-sideways.'
                  businessId:
                    type: string
                    description: An identifier for the business, unique to the customer.
                    example: XAIS12345678910
                    pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                  sequence:
                    type: number
                    description: The order number in which this loss claim is to be used it must be an integer in the range 1 to 99. The sequence must start with 1 and have no gaps.
                  lastModified:
                    type: string
                    description: The timestamp when the entry was created or last modified.
                    example: '2020-07-13T12:13:48.763Z'
                required:
                  - taxYearClaimedFor
                  - typeOfLoss
                  - typeOfClaim
                  - businessId
                  - lastModified
                additionalProperties: false
              examples:
                example-1:
                  description: Given any tax year
                  value:
                    typeOfLoss: self-employment
                    businessId: X2IS12356589871
                    typeOfClaim: carry-forward
                    taxYearClaimedFor: 2019-20
                    sequence: 2
                    lastModified: '2020-07-13T12:13:48.763Z'
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: |
                    The format of the supplied NINO field is not valid.
                  value: *ref_9
                FORMAT_CLAIM_ID:
                  description: |
                    The format of the supplied Claim ID is not valid.
                  value: *ref_29
                FORMAT_TAX_YEAR:
                  description: |
                    The format of the supplied taxYearClaimedFor value is not valid.
                  value: *ref_25
                FORMAT_VALUE:
                  description: |
                    One or more values have been added with the incorrect format.
                  value: *ref_11
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: |
                    An empty or non-matching body was submitted.
                  value: *ref_14
                FORMAT_TYPE_OF_CLAIM:
                  description: |
                    The format of the type of claim is not valid.
                  value: *ref_26
                RULE_TYPE_OF_CLAIM_INVALID:
                  description: |
                    The claim type supplied is not available for this type of loss.
                  value: *ref_30
                RULE_CSFHL_CLAIM_NOT_SUPPORTED:
                  description: |
                    carry-sideways-fhl claim for income sources "FHL Property - EEA" and "UK Property FHL" will not be supported from tax year 25/26.
                  value: *ref_31
                RULE_NO_CHANGE:
                  description: |
                    The loss amount supplied is the same as the existing stored loss amount.
                  value:
                    code: RULE_NO_CHANGE
                    message: This claim matches a previous submission
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: |
                    The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for 
                    this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_15
                RULE_OUTSIDE_AMENDMENT_WINDOW:
                  description: |
                    The request cannot be completed as you are outside the amendment window.
                  value: *ref_16
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported. The tax year specified is before the minimum tax year value.
                  value: *ref_13
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: |
                    Tax year range invalid. A tax year range of one year is required.
                  value: *ref_12
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
