openapi: 3.0.3
info:
  version: '6.0'
  title: Individual Losses (MTD)
  description: |
    The following groups of endpoints are stateful in the Sandbox:
    * [Brought Forward Losses](#tag/Brought-Forward-Losses)
    * [Loss Claims](#tag/Loss-Claims)

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Brought Forward Losses
    description: Resources related to a customer’s financial data for their brought forward losses.
  - name: Loss Claims
    description: Resources related to a customer’s financial data for their loss claims.
paths:
  /individuals/losses/{nino}/brought-forward-losses/tax-year/brought-forward-from/{taxYear}:
    post:
      summary: Create a Brought Forward Loss
      description: |
        This endpoint enables you to create a new brought forward loss which can be submitted against self-employment, self-employment class 4,
        UK Furnished Holiday Let (FHL) property, UK other (Non-FHL) property, foreign property FHL in the European Economic Area (EEA) and foreign property for the tax year prior to joining MTD.
        A National Insurance number and tax year must be provided.

        <strong>
          Note: Brought forward losses for the following 2 income sources will not be supported from tax year 2025-26 onwards:
            <ul>
              <li>uk-property-fhl</li>
              <li>foreign-property-fhl-eea</li>
            </ul>
        </strong>    

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.    

        | Header Value (Gov-Test-Scenario)     | Scenario                                                                                                                                             |
        |--------------------------------------|------------------------------------------------------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                        | Simulates success response.                                                                                                                          |
        | NOT_FOUND                            | Simulates the scenario where no data is found.                                                                                                       |
        | DUPLICATE_SUBMISSION                 | Simulates the scenario where a duplicated loss is found.                                                                                             |
        | STATEFUL                             | Performs a stateful create.                                                                                                                          |
        | BFL_NOT_SUPPORTED_FOR_FHL_PROPERTIES | Simulates the scenario where brought forward losses are submitted for income sources uk-property-fhl or foreign-property-fhl-eea for tax year 25/26. |
        | OUTSIDE_AMENDMENT_WINDOW             | Simulates the scenario where request cannot be completed as it is outside the amendment window.                                                      |
      tags:
        - Brought Forward Losses
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years. The minimum tax year is 2018-19. No gaps are allowed, for example, 2018-20 is not valid.
          schema: &ref_4
            type: string
            example: 2018-19
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_5
            type: string
            enum:
              - application/vnd.hmrc.6.0+json
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_6
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_7
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_8
            type: string
            example: '-'
          required: false
      security:
        - User-Restricted:
            - write:self-assessment
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Create a Brought Forward Loss Request
              description: Create a Brought Forward Loss Request
              type: object
              properties:
                taxYearBroughtForwardFrom:
                  type: string
                  description: The tax year to which the loss applies. The start year and end year must not span two tax years. No gaps are allowed, for example, 2020-22 is not valid. The minimum tax year is 2018-19. The tax year must have ended.
                  example: 2020-21
                typeOfLoss:
                  type: string
                  enum:
                    - self-employment
                    - self-employment-class4
                    - uk-property-fhl
                    - uk-property
                    - foreign-property-fhl-eea
                    - foreign-property
                  description: The type of business the loss applies to.
                businessId:
                  type: string
                  description: An identifier for the business, unique to the customer.
                  example: XPIS12345678910
                  pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                lossAmount:
                  type: number
                  description: Brought Forward Loss amount related to the type of loss specified. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                  multipleOf: 0.01
                  minimum: 0
                  maximum: 99999999999.99
                  example: '2345.67'
              required:
                - taxYearBroughtForwardFrom
                - typeOfLoss
                - businessId
                - lossAmount
              additionalProperties: false
            examples:
              example-1:
                description: Self-Employment Request
                value:
                  taxYearBroughtForwardFrom: 2020-21
                  businessId: XBIS12345678910
                  typeOfLoss: self-employment
                  lossAmount: 5001.99
              example-2:
                description: UK Property Request
                value:
                  taxYearBroughtForwardFrom: 2020-21
                  businessId: XPIS12345678910
                  typeOfLoss: uk-property-fhl
                  lossAmount: 500.99
              example-3:
                description: Foreign Property Request
                value:
                  taxYearBroughtForwardFrom: 2020-21
                  businessId: XFIS12345678910
                  typeOfLoss: foreign-property
                  lossAmount: 5000.99
      responses:
        '201':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Create a Brought Forward Loss Response
                description: Create a Brought Forward Loss Response
                type: object
                properties:
                  lossId:
                    description: The unique identifier of the loss.
                    type: string
                    pattern: ^[A-Za-z0-9]{15}$
                    example: AAZZ1234567890a
                required:
                  - lossId
                additionalProperties: false
              examples:
                example-1:
                  description: Example Response
                  value:
                    lossId: AAZZ1234567890a
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: &ref_1
                  code:
                    description: The error code
                    type: string
                  message:
                    description: The error message
                    type: string
                required: &ref_2
                  - code
              examples:
                FORMAT_NINO:
                  description: |
                    The format of the supplied NINO field is not valid.
                  value: &ref_9
                    code: FORMAT_NINO
                    message: The provided NINO is invalid
                FORMAT_TAX_YEAR:
                  description: |
                    The format of the supplied taxYear value is not valid.
                  value: &ref_10
                    code: FORMAT_TAX_YEAR
                    message: The taxYear format is invalid
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: |
                    Tax year range invalid. A tax year range of one year is required.
                  value: &ref_12
                    code: RULE_TAX_YEAR_RANGE_INVALID
                    message: A tax year range of one year is required
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported. The tax year specified is before the minimum tax year value.
                  value: &ref_13
                    code: RULE_TAX_YEAR_NOT_SUPPORTED
                    message: The tax year specified does not lie within the supported range
                FORMAT_VALUE:
                  description: |
                    One or more values have been added with the incorrect format.
                  value: &ref_11
                    code: FORMAT_VALUE
                    message: The value must be between 0 and 99999999999.99
                FORMAT_BUSINESS_ID:
                  description: |
                    The format of the supplied Business ID field is not valid.
                  value: &ref_20
                    code: FORMAT_BUSINESS_ID
                    message: The provided Business ID is invalid
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: |
                    An empty or non-matching body was submitted.
                  value: &ref_14
                    code: RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED
                    message: An empty or non-matching body was submitted
                FORMAT_TYPE_OF_LOSS:
                  description: |
                    The format of the supplied type of loss field is not valid.
                  value: &ref_19
                    code: FORMAT_TYPE_OF_LOSS
                    message: The provided type of Loss is invalid
                RULE_DUPLICATE_SUBMISSION:
                  description: |
                    The remote endpoint has indicated that submission already exists for this Resource.
                  value:
                    code: RULE_DUPLICATE_SUBMISSION
                    message: Submission already exists
                RULE_TAX_YEAR_NOT_ENDED:
                  description: |
                    The submission has been made before the taxYear it relates to has ended.
                  value:
                    code: RULE_TAX_YEAR_NOT_ENDED
                    message: Tax year not ended
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: |
                    The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for 
                    this endpoint version. This error will only be returned in the Sandbox environment.
                  value: &ref_15
                    code: RULE_INCORRECT_GOV_TEST_SCENARIO
                    message: The supplied Gov-Test-Scenario is not valid
                RULE_BFL_NOT_SUPPORTED_FOR_FHL_PROPERTIES:
                  description: |
                    Brought forward losses for income sources "FHL Property - EEA" and "UK Property FHL" will not be supported from tax year 25/26.
                  value:
                    code: RULE_BFL_NOT_SUPPORTED_FOR_FHL_PROPERTIES
                    message: Brought forward losses for income sources uk-property-fhl and foreign-property-fhl-eea are not supported from tax year 25/26
                RULE_OUTSIDE_AMENDMENT_WINDOW:
                  description: |
                    The request cannot be completed as you are outside the amendment window.
                  value: &ref_16
                    code: RULE_OUTSIDE_AMENDMENT_WINDOW
                    message: You are outside the amendment window
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client and/or agent is not authorised. This is normally because: the client is not subscribed to MTD, the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: &ref_17
                    code: CLIENT_OR_AGENT_NOT_AUTHORISED
                    message: |
                      The client or agent is not authorised
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: |
                    Matching resource not found.
                  value: &ref_18
                    code: MATCHING_RESOURCE_NOT_FOUND
                    message: Matching resource not found
  /individuals/losses/{nino}/brought-forward-losses/{lossId}/tax-year/{taxYear}/change-loss-amount:
    post:
      summary: Amend a Brought Forward Loss Amount
      description: |
        This endpoint enables you to update an existing brought forward loss amount.
        A National Insurance number, tax year and Loss ID must be provided.

        <strong>
          Note: Brought forward losses for the following 2 income sources will not be supported from tax year 2025-26 onwards:
            <ul>
              <li>uk-property-fhl</li>
              <li>foreign-property-fhl-eea</li>
            </ul>
        </strong>

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.    

        | Header Value (Gov-Test-Scenario)  | Scenario                                                                                                                            |
        |-----------------------------------|-------------------------------------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                     | Simulates success response where type of loss is Self-Employment.                                                                   |
        | CLASS_4                           | Simulates the scenario where type of loss is Self-Employment Class 4.                                                               |
        | FOREIGN_PROPERTY                  | Simulates the scenario where type of loss is Foreign Property.                                                                      |
        | FOREIGN_PROPERTY_FHL_EEA          | Simulates the scenario where type of loss is Foreign Property FHL EEA.                                                              |
        | UK_PROPERTY_FHL                   | Simulates the scenario where type of loss is UK Property FHL.                                                                       |
        | UK_PROPERTY                       | Simulates the scenario where type of loss is UK Property (Non-FHL).                                                                 |
        | NOT_FOUND                         | Simulates the scenario where no data is found.                                                                                      |
        | NO_CHANGE                         | Simulates the scenario where the brought forward loss amount has not changed.                                                       |
        | OUTSIDE_AMENDMENT_WINDOW          | Simulates the scenario where request cannot be completed as it is outside the amendment window.                                     |
        | DYNAMIC                           | The following response values will change to correspond to the values submitted in the request:<br> • lossAmount<br> • lastModified |
        | STATEFUL                          | Performs a stateful update.                                                                                                         |
      tags:
        - Brought Forward Losses
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: *ref_3
          required: true
        - name: lossId
          in: path
          description: |
            The unique identifier of the loss.
          schema: &ref_21
            type: string
            example: AAZZ1234567890A
            pattern: ^[A-Za-z0-9]{15}$
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years. The minimum tax year is 2018-19. No gaps are allowed, for example, 2018-20 is not valid.
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_6
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_7
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_8
          required: false
      security:
        - User-Restricted:
            - write:self-assessment
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Amend a Brought Forward Loss Amount Request
              description: Amend a Brought Forward Loss Amount Request
              type: object
              properties:
                lossAmount:
                  type: number
                  description: Brought Forward Loss amount related to the type of loss specified. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                  multipleOf: 0.01
                  minimum: 0
                  maximum: 99999999999.99
                  example: '5000.99'
              required:
                - lossAmount
              additionalProperties: false
            examples:
              example-1:
                description: Default Example
                value:
                  lossAmount: 3456.78
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Amend a Brought Forward Loss Amount Response
                description: Amend a Brought Forward Loss Amount Response
                type: object
                properties:
                  businessId:
                    type: string
                    description: An identifier for the business, unique to the customer.
                    example: XAIS12345678910
                    pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                  typeOfLoss:
                    type: string
                    enum:
                      - self-employment
                      - self-employment-class4
                      - uk-property-fhl
                      - uk-property
                      - foreign-property-fhl-eea
                      - foreign-property
                    description: The type of business the loss applies to.
                  lossAmount:
                    type: number
                    description: Brought Forward Loss amount related to the type of loss specified. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                    multipleOf: 0.01
                    minimum: 0
                    maximum: 99999999999.99
                    example: '12345.67'
                  taxYearBroughtForwardFrom:
                    type: string
                    description: The tax year to which the loss applies. The start year and end year must not span two tax years. The minimum tax year is 2018-19. No gaps are allowed, for example, 2022-24 is not valid.
                    example: 2018-19
                  lastModified:
                    type: string
                    description: The timestamp when the entry was created or last modified.
                    format: date-time
                    pattern: ^2[0-9]{3}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]{0,3}|)Z$
                    example: '2020-07-13T12:13:48.763Z'
                required:
                  - businessId
                  - typeOfLoss
                  - lossAmount
                  - taxYearBroughtForwardFrom
                  - lastModified
                additionalProperties: false
              examples:
                example-1:
                  description: Self-Employment Class 4 Loss
                  value:
                    businessId: XBIS12345678910
                    typeOfLoss: self-employment-class4
                    lossAmount: 3456.78
                    taxYearBroughtForwardFrom: 2021-22
                    lastModified: '2022-07-13T12:13:48.763Z'
                example-2:
                  description: UK Property (Non-FHL) Loss
                  value:
                    businessId: XPIS12345678910
                    typeOfLoss: uk-property
                    lossAmount: 3456.78
                    taxYearBroughtForwardFrom: 2021-22
                    lastModified: '2022-07-13T12:13:48.763Z'
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: |
                    The format of the supplied NINO field is not valid.
                  value: *ref_9
                FORMAT_LOSS_ID:
                  description: |
                    The format of the supplied Loss ID is not valid.
                  value: &ref_23
                    code: FORMAT_LOSS_ID
                    message: The provided Loss ID is invalid
                FORMAT_TAX_YEAR:
                  description: |
                    The format of the supplied taxYear value is not valid.
                  value: *ref_10
                FORMAT_VALUE:
                  description: |
                    One or more values have been added with the incorrect format.
                  value: *ref_11
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: |
                    Tax year range invalid. A tax year range of one year is required.
                  value: *ref_12
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported. The tax year specified is before the minimum tax year value.
                  value: *ref_13
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: |
                    An empty or non-matching body was submitted.
                  value: *ref_14
                RULE_NO_CHANGE:
                  description: |
                    The loss amount supplied is the same as the existing stored loss amount.
                  value:
                    code: RULE_NO_CHANGE
                    message: The brought forward loss amount has not changed
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: |
                    The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for 
                    this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_15
                RULE_OUTSIDE_AMENDMENT_WINDOW:
                  description: |
                    The request cannot be completed as you are outside the amendment window.
                  value: *ref_16
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client and/or agent is not authorised. This is normally because: the client is not subscribed to MTD, the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: *ref_17
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: |
                    Matching resource not found.
                  value: *ref_18
  /individuals/losses/{nino}/brought-forward-losses/tax-year/{taxYearBroughtForwardFrom}:
    get:
      summary: List Brought Forward Losses
      description: |
        This endpoint enables you to retrieve a list of all brought forward losses that have incurred before joining MTD.
        A National Insurance number and tax year must be provided.

        <strong>
          Note: Brought forward losses for the following 2 income sources will not be supported from tax year 2025-26 onwards:
            <ul>
              <li>uk-property-fhl</li>
              <li>foreign-property-fhl-eea</li>
            </ul>
        </strong>

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                 |
        |----------------------------------|----------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response with multiple business types. |
        | SELF_EMPLOYMENT                  | Simulates success response with only self-employment.    |
        | UK_PROPERTY                      | Simulates success response with only UK property.        |
        | FOREIGN_PROPERTY                 | Simulates success response with only foreign property.   |
        | TAX_YEAR_NOT_SUPPORTED           | Simulates the scenario where the tax year specified in taxYearBroughtForwardFrom is not supported. |
        | NOT_FOUND                        | Simulates the scenario where no data is found.           |
        | DYNAMIC                          | The following response values will change to correspond to the values submitted in the request:<br> • businessID<br> • typeOfLoss<br> • taxYearBroughtForwardFrom<br> • lastModified |
        | STATEFUL                         | Performs a stateful list.                                |
      tags:
        - Brought Forward Losses
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: *ref_3
          required: true
        - name: taxYearBroughtForwardFrom
          in: path
          description: |
            The tax year to which the loss applies in the format YYYY-YY.  The minimum tax year is 2018-19. The tax year must have ended. No gaps are allowed. For example, 2020-22 is not valid.
          schema:
            type: string
