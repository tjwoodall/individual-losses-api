      summary: Delete Losses and Claims [test only]
      description: |
        This endpoint allows a developer to delete a claim or a brought-forward-loss for a specified individual and business for a given tax year.
        A National Insurance number, business ID and tax year are required.
          
          ### Test data
          Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.
          
          | Header Value (Gov-Test-Scenario) | Scenario                                                                                        |
          |----------------------------------|-------------------------------------------------------------------------------------------------|
          | N/A - DEFAULT                    | Simulates success response.                                                                     |
          | NOT_FOUND                        | Simulates the scenario where no data is found.                                                  |
          | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window. |
          | STATEFUL                         | Performs a stateful delete.                                                                     |
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years. The minimum tax year is 2026-27. No gaps are allowed, for example, 2026-28 is not valid.
